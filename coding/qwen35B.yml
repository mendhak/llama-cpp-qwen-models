services:
  llama-server:
    extends:
      file: ../compose-common.yml
      service: llama-server
    # Nice models: Qwen3.6-35B-A3B-UD-Q8_K_XL.gguf, Qwen3.6-35B-A3B-MXFP4_MOE.gguf
    command: >
      --model /models/Qwen3.6-35B-A3B-MXFP4_MOE.gguf
      --port 8080
      --host 0.0.0.0
      --threads 8
      --temp 0.6 --top_p 0.95 --top_k 20 --min_p 0.0 --presence_penalty 0.0 --repeat_penalty 1.0
      --fit on
      --fit-target 512
      --fit-ctx 262144
      --cache-type-k q4_0 --cache-type-v q4_0
      --spec-type ngram-mod --spec-ngram-size-n 12 --draft-min 48 --draft-max 64
      --parallel 1
      --flash-attn on
      --no-mmap
      --sleep-idle-seconds 300
      --chat-template-kwargs '{"preserve_thinking": true}' --reasoning-budget -1
      --webui-mcp-proxy
